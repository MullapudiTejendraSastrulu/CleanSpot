<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CleanSpot Admin - Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* CleanSpot Admin - Beautiful & Light Design */
    :root{
      --primary:#22c55e; --primary-light:#dcfce7; --primary-dark:#15803d;
      --secondary:#06b6d4; --secondary-light:#e0f7fa; --secondary-dark:#0891b2;
      --accent:#f59e0b; --accent-light:#fef3c7; --accent-dark:#d97706;
      --danger:#ef4444; --danger-light:#fee2e2; --danger-dark:#dc2626;
      --bg:linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f0f9ff 100%);
      --card:#ffffff; --card-shadow:0 10px 25px rgba(34,197,94,0.08);
      --text:#064e3b; --text-light:#6b7280; --border:#d1fae5;
    }
    *{box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;margin:0;background:var(--bg);color:var(--text);line-height:1.6}
    .container{max-width:1200px;margin:0 auto;padding:20px}
    
    /* Header */
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;padding:20px 0}
    .admin-logo{display:flex;align-items:center;gap:12px}
    .admin-logo .icon{width:40px;height:40px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
    h1{margin:0;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    
    .card{background:var(--card);border-radius:16px;box-shadow:var(--card-shadow);padding:24px;margin-bottom:24px;border:1px solid var(--border)}
    .login-form{max-width:450px;margin:100px auto}
    .login-form h2{text-align:center;color:var(--primary-dark);margin-bottom:30px;font-size:1.8rem}
    
    label{display:block;margin:16px 0 8px;font-weight:600;color:var(--text)}
    input[type=text],input[type=password],select{width:100%;padding:12px 16px;border-radius:12px;border:2px solid var(--border);font-size:1rem;transition:all 0.3s ease;background:#fafafa}
    input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
    
    button{background:linear-gradient(135deg,var(--primary),var(--primary-dark));border:none;color:white;padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:600;transition:all 0.3s ease;font-size:0.95rem;margin-right:8px}
    button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(34,197,94,0.3)}
    button.danger{background:linear-gradient(135deg,var(--danger),var(--danger-dark))}
    button.danger:hover{box-shadow:0 8px 20px rgba(239,68,68,0.3)}
    
    .report-item{padding:20px;border-radius:16px;border:2px solid var(--border);margin-bottom:16px;display:flex;gap:16px;background:var(--card);transition:all 0.3s ease}
    .report-item:hover{border-color:var(--primary);box-shadow:var(--card-shadow)}
    .thumb{width:140px;height:100px;border-radius:12px;object-fit:cover;border:2px solid var(--border)}
    .meta{flex:1}
    .small{font-size:0.9rem;color:var(--text-light)}
    
    .status-pill{display:inline-block;padding:6px 12px;border-radius:20px;font-weight:600;font-size:0.85rem}
    .status-pending{background:var(--accent-light);color:var(--accent-dark)}
    .status-progress{background:var(--secondary-light);color:var(--secondary-dark)}
    .status-resolved{background:var(--primary-light);color:var(--primary-dark)}
    
    .actions{display:flex;gap:12px;margin-top:12px;align-items:center}
    .hidden{display:none}
    
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px}
    .stat-card{background:var(--card);padding:24px;border-radius:16px;text-align:center;border:2px solid var(--border);transition:all 0.3s ease}
    .stat-card:hover{border-color:var(--primary);box-shadow:var(--card-shadow)}
    .stat-number{font-size:2.5rem;font-weight:bold;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .stat-label{color:var(--text-light);font-weight:600}
  </style>
</head>
<body>
  <div id="loginSection">
    <div class="card login-form">
      <div style="text-align:center;margin-bottom:30px">
        <div style="display:inline-flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="width:48px;height:48px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px">🌱</div>
          <h2 style="margin:0;font-size:2rem;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">CleanSpot</h2>
        </div>
        <p style="color:var(--text-light);margin:0">Admin Dashboard Login</p>
      </div>
      <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" required />
        <label for="password">Password</label>
        <input type="password" id="password" required />
        <button type="submit" style="margin-top:12px;width:100%">Login</button>
      </form>
      <div id="loginError" style="color:var(--danger);margin-top:10px"></div>
    </div>
  </div>

  <div id="adminSection" class="hidden">
    <div class="container">
      <header>
        <div class="admin-logo">
          <div class="icon">🌱</div>
          <div>
            <h1>CleanSpot Admin</h1>
            <p style="margin:0;color:var(--text-light);font-size:0.9rem">Food Waste Management Dashboard</p>
          </div>
        </div>
        <button onclick="logout()">🚪 Logout</button>
      </header>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalReports">0</div>
          <div class="stat-label">📈 Total Reports</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="pendingReports">0</div>
          <div class="stat-label">⏳ Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="progressReports">0</div>
          <div class="stat-label">🔄 In Progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="resolvedReports">0</div>
          <div class="stat-label">✅ Resolved</div>
        </div>
      </div>

      <div class="card">
        <h3>📋 All Reports</h3>
        <div id="reportsList">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000';
    let authToken = localStorage.getItem('adminToken');

    if(authToken) {
      showAdminSection();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch(API_BASE + '/api/admin/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, password})
        });
        
        const data = await res.json();
        if(res.ok) {
          authToken = data.token;
          localStorage.setItem('adminToken', authToken);
          showAdminSection();
        } else {
          document.getElementById('loginError').textContent = data.error;
        }
      } catch(err) {
        document.getElementById('loginError').textContent = 'Server error';
      }
    });

    function showAdminSection() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('adminSection').classList.remove('hidden');
      loadReports();
    }

    function logout() {
      localStorage.removeItem('adminToken');
      authToken = null;
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('adminSection').classList.add('hidden');
    }

    function statusClass(status){
      if(status==='pending') return 'status-pending';
      if(status==='in-progress') return 'status-progress';
      if(status==='resolved') return 'status-resolved';
      return '';
    }

    async function updateStatus(id, newStatus) {
      try {
        const res = await fetch(API_BASE + '/api/admin/report/' + id + '/status', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authToken
          },
          body: JSON.stringify({status: newStatus})
        });
        
        if(res.ok) {
          loadReports();
        }
      } catch(err) {
        console.error('Failed to update status');
      }
    }

    async function deleteReport(id) {
      if(!confirm('Delete this report?')) return;
      
      try {
        const res = await fetch(API_BASE + '/api/admin/report/' + id, {
          method: 'DELETE',
          headers: {'Authorization': 'Bearer ' + authToken}
        });
        
        if(res.ok) {
          loadReports();
        }
      } catch(err) {
        console.error('Failed to delete report');
      }
    }

    async function loadReports() {
      try {
        const res = await fetch(API_BASE + '/api/admin/reports', {
          headers: {'Authorization': 'Bearer ' + authToken}
        });
        
        if(!res.ok) {
          if(res.status === 401) {
            logout();
            return;
          }
          throw new Error('Failed to load');
        }
        
        const reports = await res.json();
        renderReports(reports);
        updateStats(reports);
      } catch(err) {
        document.getElementById('reportsList').innerHTML = '<div class="small">Failed to load reports</div>';
      }
    }

    function updateStats(reports) {
      const total = reports.length;
      const pending = reports.filter(r => r.status === 'pending').length;
      const progress = reports.filter(r => r.status === 'in-progress').length;
      const resolved = reports.filter(r => r.status === 'resolved').length;
      
      document.getElementById('totalReports').textContent = total;
      document.getElementById('pendingReports').textContent = pending;
      document.getElementById('progressReports').textContent = progress;
      document.getElementById('resolvedReports').textContent = resolved;
    }

    function renderReports(reports) {
      const root = document.getElementById('reportsList');
      root.innerHTML = '';
      
      if(!reports.length) {
        root.innerHTML = '<div class="small">No reports yet.</div>';
        return;
      }
      
      reports.forEach(r => {
        const div = document.createElement('div');
        div.className = 'report-item';
        div.innerHTML = `
          <img class="thumb" src="${API_BASE + r.image_url}" alt="thumb" />
          <div class="meta">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
              <strong>Report #${r.id}</strong>
              <span class="small">${new Date(r.created_at).toLocaleString()}</span>
              <span class="status-pill ${statusClass(r.status)}">${r.status}</span>
            </div>
            <div class="small"><strong>Location:</strong> ${r.location}</div>
            <div class="small"><strong>Category:</strong> ${r.category}</div>
            <div style="margin-top:6px">${r.description}</div>
            <div class="actions">
              <select onchange="updateStatus(${r.id}, this.value)">
                <option value="pending" ${r.status==='pending'?'selected':''}>Pending</option>
                <option value="in-progress" ${r.status==='in-progress'?'selected':''}>In Progress</option>
                <option value="resolved" ${r.status==='resolved'?'selected':''}>Resolved</option>
              </select>
              <button class="danger" onclick="deleteReport(${r.id})">Delete</button>
            </div>
          </div>
        `;
        root.appendChild(div);
      });
    }
  </script>
</body>
</html>
